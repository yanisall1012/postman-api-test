name: Postman API Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  newman-tests:
    runs-on: ubuntu-latest        # ← changé : ubuntu évite les bugs de chemin Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run Postman Collection
        run: |
          newman run "collections/CollectionClient2.postman_collection.json" \
            -e "environments/PP.postman_environment.json" \
            -r cli,htmlextra \
            --reporter-htmlextra-export "reports/report.html"

      - name: Verify report exists
        run: ls -la reports/

      - name: Upload HTML Report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/report.html

      - name: Send Email with HTML Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "GitHub Actions - Newman Report - ${{ job.status }}"
          to: yanisall1012@gmail.com, y.djamel@dsyconsulting.fr
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
          html_body: file://reports/report.html
          attachments: ${{ github.workspace }}/reports/report.html